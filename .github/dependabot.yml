version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      deps:
        patterns: [ "*" ]
        commit-message:
          prefix: "fix(deps): "
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: [ "*" ]
        commit-message:
          prefix: "chore(deps): "
