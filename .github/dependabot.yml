version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix(deps): "
  - package-ecosystem: "github-actions"
    groups:
      name: github-actions
      patterns: [ "*" ]
    directory: "/"
    commit-message:
      prefix: "chore(deps): "
    schedule:
      interval: "weekly"